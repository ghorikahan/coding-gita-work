<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px 5px;
        }

        .display-grid {
            height: 8vh;
            background-color: red;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="display-grid">box-1</div>
        <div class="display-grid">box-2</div>
        <div class="display-grid">box-3</div>
        <div class="display-grid">box-4</div>
        <div class="display-grid">box-5</div>
        <div class="display-grid">box-6</div>
        <div class="display-grid">box-7</div>
        <div class="display-grid">box-8</div>
        <div class="display-grid">box-9</div>
    </div>
</body>

</html>
