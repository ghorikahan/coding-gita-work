<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(2, 200px);
            grid-template-rows: repeat(9, 200px);
            gap: 20px 15px;
        }

        .box {
            background-color: red;
        }

        
    </style>
</head>

<body>
    <div class="container">
        <p class="box box1">box1</p>
        <p class="box box2">box2</p>
        <p class="box box3">box3</p>
        <p class="box box4">box4</p>
        <p class="box box5">box5</p>
        <p class="box box6">box6</p>
        <p class="box box7">box7</p>
        <p class="box box8">box8</p>
        <p class="box box9">box9</p>
    </div>
</body>

</html>
