<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">

        <!-- input type color -->
        <input type="color">
        <!-- input type date -->
        <input type="date">
        <br>
        <!-- number with min and max -->
        <input type="number" min="00" max="10">
        <br>
        <!-- date with min & max -->
        <input type="date" min="2024-02-05" max="2025-03-04">
        <br>
        <!-- input type file -->
        <input type="file">
        <br>
        <!-- month input  -->
        <input type="month" name="" id="">
        <br>
        <!-- Week Input -->
        <input type="week">
        <br>
        <input type="image" src="download.jpeg" alt="Better Call Saul">
        <br>
        <!-- input Range -->
        <input type="range">
        <!-- input range using some more attribute -->
         <input type="range" name="Brightness" min="0" max="100" value="50" oninput="output.value = this.value">

         <!-- input type Reset(when we have to reset form) -->
        <input type="reset" value="reset form">
    </form>
</body>
</html>
