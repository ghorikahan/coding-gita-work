<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1> Registration Form</h1>

    <form autocomplete="on">
        <label for="first">First Name:</label>
        <input type="text" id="first" placeholder="First name">
        <br><br>
        <label for="last">Last Name:</label>
        <input type="text" id="last" placeholder="Enter Last name">
        <br><br>
        <label for="email"> Email:</label>
        <input type="email" id="email" placeholder="Enter email sddress">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password">
        <br><br>

        <label for="Gender">Gender:-</label>
        <br>
        <label for="Male">Male</label>
        <input type="radio" name="gender" id="Male">

        <label for="Female"> Female:</label>
        <input type="radio" name="gender" id="Female">

        <label for="other">other: </label>
        <input type="radio" name="gender" id="other">

        <br>
        <br>

        <label for="Age"> Age:</label>
        <input type="number" id="Age" min="0">
        <br>
        <br>
        <label for="">Preferences:</label>
        <br>
        <label for="ACR">Acrylic Painting</label>
        <input type="checkbox" name="Preferences" id="ACR">

        <label for="OIL">Oil Painting</label>
        <input type="checkbox" name="Preferences" id="OIL">

        <label for="WAT"> Water color Painting</label>
        <input type="checkbox" name="Preferences" id="WAT">
        <br>
        <br>
        <label for="">Select Occupation:</label>
        <select name="" id="">
            <option value="Student">Student</option>
            <option value="Student">Graduate Student</option>
            <option value="Student">Working Employe</option>
        </select>
        <br><br>
        <label for="">Bio </label>
        <textarea name="" id="" cols="30" rows="10" placeholder="Share few lines about Yourself..."></textarea>
        <br><br>
        <button>Reset</button>
        <button>Submit</button>
    </form>

 </body>

</html>
