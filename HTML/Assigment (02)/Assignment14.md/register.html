<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration form </title>
</head>

<body>
    <h1>CodingGita Student Registration Form</h1>

    <p>
        Please fill out the form below to register for the
        CodingGita MERN Stack Program.
    </p>

    <hr>

    <form action="">
        <label for="name"> Full name: </label>
        <input type="text" id="name">
        <br>
        <br>
        <label for="email"> Email: </label>
        <input type="email" id="email">
        <br>
        <br>
        <label for="password"> Password: </label>
        <input type="password" id="password">
        <br>
        <br>
        <label for="mob">Mobile number:</label>
        <input type="number" id="mob">
        <br>
        <br>
        <label for="">Gender:</label>

        <input type="radio" id="male" name="gender">
        <label for="male">Male</label>

        <input type="radio" id="Female" name="gender">
        <label for="Female">Female</label>

        <input type="radio" id="Other" name="gender">
        <label for="Other">Other</label>

        <br>
        <br>
        <label for="">Hobbies:</label>

        <input type="checkbox" id="read" name="Hobbies">
        <label for="read"> Reading</label>

        <input type="checkbox" id="Coding" name="Hobbies">
        <label for="Coding">Coding:</label>

        <input type="checkbox" id="spo" name="Hobbies">
        <label for="spo"> Sports</label>

        <input type="checkbox" id="Music" name="Hobbies">
        <label for="Music">Music</label>
        <br>
        <br>
        <label for="DOB">Date of birth: </label>
        <input type="date" id="DOB">
        <br>
        <br>

        <label for="fill">Choose your file:</label>
        <input type="file" id="fill">
        <br>
        <br>

        <label for="course">Course Selection:</label>
        <select name="" id="course">
            <option value="">Mern Stack</option>
            <option value="">DSA</option>
            <option value="">Web Development</option>
        </select>

        <br>
        <br>

        <label for="Add">Address:</label>
        <br>
        <textarea name="" id="Add" rows="10" cols="50"></textarea>
        <br>
        <br>

        <label for="rng">Preferred study hours:</label>
        <input type="range" min="0" max="100" id="rng" value="number" oninput="output.value=this.value">

        <output name="output"> 50</output>
        <br>
        <br>
        <label for="clr">Favorite color:</label>
        <input type="color" id="clr">

        <br>
        <br>

        <label for="">portfolio Website:</label>
        <a href="https://www.CodingGita.com">https://www.CodingGita.com</a>

        <br>
        <br>

        <label for="srh">Search Interests:</label>
        <input type="search" placeholder="search" id="srh">
<br>
<br>
        <label for="tm">Preferred study Time:</label>
        <input type="time" id="tm">

    <br>
    <br>
        <input type="submit">
        <input type="reset">




    </form>
</body>

</html>
