<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>CodingGita Feedback Form</h1>

    <p>We value your feedback. Please fill out this form to help us improve.</p>
    <hr>
    <form action="#" method="post">

        <label for="nme">Name:</label>
        <input type="text" id="nme">
        <br>
        <br>
        <label for="eml">Email:</label>
        <input type="email" id="eml">
        <br>
        <br>
        <label for=""> Which course/workshop are you giving feedback for </label>
        <br>
        <br>
        <select name="" id="">
            <option value=""> MERN Stack Course</option>
            <option value="">DSA Bootcamp</option>
            <option value="">Web Development Workshop</option>
            <option value=""></option>
        </select>
        <br>
        <br>
        <label for="">Rate Your stars:</label>

        <input type="radio" id="1str" name="star">
        <label for="1str">1 Star</label>

        <input type="radio" id="2str" name="star">
        <label for="2str">2 Star</label>

        <input type="radio" id="3str" name="star">
        <label for="3str">3 Star</label>

        <input type="radio" id="4str" name="star">
        <label for="4str">4 Star</label>

        <input type="radio" id="5str" name="star">
        <label for="5str">5 Star</label>
        <br>
        <br>
        <label for="">What aspects are you giving feedback on?</label>
        <br>
        <input type="checkbox" id="cnt qut">
        <label for="cnt qut">Content Quality</label>
        <br>
        <input type="checkbox" id="tch mth">
        <label for="tch mth">Teaching method</label>
        <br>
        <input type="checkbox" id="sup gui">
        <label for="sup gui">Support & Guidance</label>
        <br>
        <input type="checkbox" id="ovr exp">
        <label for="ovr exp"> Overall Experience</label>
<br>
        <label for="">Additional Suggestions:</label>
        <br>
        <textarea name="" id="" rows="10" cols="50"></textarea>

        <br>
        <br>
        <label for="">How much satisfied are you?</label>
         <input type="range" min="0" max="10" id="rng" value="number" oninput="output.value=this.value">

        <output name="output"> 5</output>
<br>
<br>
<label for="rtf">would you recommend us to a friend</label>
<br>
         <input type="radio" id="Yes" name="">
         <label for="Yes">Yes</label>

          <input type="radio" id="No" name="">
         <label for="No">No</label>
<br>
<br>
<label for="dt">Date of Feedback: </label>
<input type="date" id="dt">
<br>
<br>
<input type="submit">

<input type="reset">
    </form>
</body>

</html>
