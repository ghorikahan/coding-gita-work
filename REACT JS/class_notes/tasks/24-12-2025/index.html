<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conversion</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            height: 30vh;
            width: 30vw;
            background-color: #892CDF;
            border-radius: 2vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2vw;
        }

        input {
            width: 25vw;
            height: 3vh;
            border: none;
            border-radius: .4vw;
        }

        .conversion-type{
            display: flex;
            gap: 3vw;
        }
    </style>
</head>

<body>

    <div class="container">
        <div><input type="text" name="" id="num"></div>
        <div><button type="button">Click me!</button></div>
        <div class="conversion-type">
            <button type="button">Miles</button>
            <button type="button">Cm</button>
            <button type="button">Feet</button>
        </div>
    </div>
</body>

</html>
