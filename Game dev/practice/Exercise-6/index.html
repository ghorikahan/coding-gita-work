<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="text-display">
    <button type="button" id="add">Add Item</button>
    <ul id="unorderd-list">
    </ul>

    <script>
        var addBtn = document.querySelector('#add');
        var addList = document.querySelector('#unorderd-list');
        addBtn.addEventListener('click',()=>{
            addList.textContent = `<li>input.value</li>`;
        });
    </script>
</body>
</html>
