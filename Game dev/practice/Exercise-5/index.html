<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <img id="img"
        src="https://images.unsplash.com/photo-1517960413843-0aee8e2b3285?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8ZmVlbCUyMGdvb2R8ZW58MHx8MHx8fDA%3D"
        height="100px" width="150px" alt="">

    <button type="button" id="button1">Show Image1</button>
    <button type="button" id="button2">show Image2</button>

    <script>
        var btn1 = document.querySelector('#button1');
        var btn2 = document.querySelector('#button2');
        var imgChange = document.querySelector('#img');

        btn2.addEventListener('click', () => {
            imgChange.src = "https://plus.unsplash.com/premium_photo-1673603988195-1253725273e8?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8dG9wJTIwb2YlMjB0aGUlMjB3b3JsZHxlbnwwfHwwfHx8MA%3D%3D";
        });
        btn1.addEventListener('click', () => {
            imgChange.src = "https://images.unsplash.com/photo-1517960413843-0aee8e2b3285?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8ZmVlbCUyMGdvb2R8ZW58MHx8MHx8fDA%3D";
        });
    </script>
</body>

</html>
