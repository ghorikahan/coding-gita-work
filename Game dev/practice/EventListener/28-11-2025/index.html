<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #card {
            height: 50vh;
            width: 50vw;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 2rem;

        }
    </style>
</head>

<body>
    <div id="card">
        I am A card
        <div id="in-count">in count </div>
        <div id="out-count"> Out count</div>
    </div>
    <button type="button" id="save">Save</button>

    <script>
        var card = document.querySelector('#card');
        var in1 = document.querySelector('#in-count');
        var out1 = document.querySelector('#out-count');
        var in1 = 0;
        var out1 = 0;
        var savedContent = document.querySelector('#save');

        function rndBackclr() {
            var r = Math.floor(Math.random() * 256);
            var g = Math.floor(Math.random() * 256);
            var b = Math.floor(Math.random() * 256);

            return `rgb(${r},${g},${b})`;
        }
        var ro = Math.floor(Math.random() * 256);
        var go = Math.floor(Math.random() * 256);
        var bo = Math.floor(Math.random() * 256);
        card.addEventListener('mouseenter', () => {
            card.style.backgroundColor = rndBackclr();
            card.style.color = rndBackclr();
            in1.textContent = ++in1;
            console.log(in1);
        });
        card.addEventListener('mouseleave', function () {
            card.style.backgroundColor = rndBackclr();
            card.style.color = rndBackclr();
            out1.textContent = ++out1;
            console.log(out1);
        });
    </script>
</body>

</html>
