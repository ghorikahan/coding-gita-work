<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #hoverCard {
            height: 500px;
            width: 500px;
            border: 5px solid black; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
    </style>
</head>

<body>
    <div id="hoverCard">hover on me!</div>

    <h1>copy me!</h1>
    <input type="text" id="input" placeholder="i will change border to red ">
    <script>

        var card = document.querySelector('#hoverCard');

        var cnginput = document.querySelector('#input');

        document.addEventListener("copy",(event)=>{
            console.log(event.target);
        });
        document.addEventListener("paste",(event)=>{
            console.log(event.target);
        });
        document.addEventListener("dblclick",(event)=>{

            console.log(event.target.getAttribute("id"));
            
        })
        cnginput.addEventListener("focus",()=>{

            cnginput.style.borderColor = "red";
            
        })

        card.addEventListener("mousemove",(event)=>{
            console.log("hte current location is:" +event.clientX+ " " +event.clientY);
        });

        document.addEventListener("wheel",(event)=>{
            if(event.deltaY > 0){
                console.log("downward");
            }
            else if(event.deltaY < 0){
                console.log("upward");
            }
            else{
                console.log("static");
            }
        });

         

        console.log(card);
        card.addEventListener("mouseenter", () => {
            card.style.backgroundColor = "black";
            card.style.color = "white";
            card.style.fontWeight = 550;
            card.style.fontSize = "3rem";
            card.style.border = "5px solid white";
        });
        
        card.addEventListener("mouseleave",function(){
            card.style.backgroundColor = "white";
            card.style.color = "black";
            card.style.fontWeight = 550;
            card.style.fontSize = "3rem";
            card.style.border = "5px solid black";
        });
    </script>
</body>

</html>
