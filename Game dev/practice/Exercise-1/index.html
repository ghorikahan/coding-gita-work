<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="para">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Dolorum, molestias! Veniam excepturi rem iusto autem assumenda harum obcaecati facilis! Non temporibus eaque voluptatum. </p>

    <button type="button" id="change-content"> click me!(to change the content of this given para graph)</button>

    <script>
        var button = document.querySelector('#change-content');
        var paragraph = document.querySelector('#para');
        button.addEventListener('click',function(){
            paragraph.textContent = "This content is changed using js";
        });
    </script>
</body>
</html>
