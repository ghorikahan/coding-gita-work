<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="container">
        <!-- header section -->
        <div class="life-line">
            <div class="heart1">&hearts;</div>
            <div class="heart2">&hearts;</div> 
            <div class="heart3">&hearts;</div> 
            <div class="life-line-count"></div>
        </div>
        <header>
            <h1>The Great </h1>
            <h1 id="colorDisplay" class="color-display">RGB Color Guessing Game</h1>
            <h1>Guessing Game</h1>
        </header>

        <!-- message display  -->
        <div id="message" class="message">Pick a color!</div>

        <!-- streak Display  -->
        <div class="streak-section">
            <div class="streak-box">
                <h3>Current Streak</h3>
                <div id="currentStreak" class="streak-number">0</div>
            </div>
            <div class="streak-box">
                <h3>best Streak</h3>
                <div id="bestStreak" class="streak-number">0</div>
            </div>
        </div>
        <!-- control buttons -->
        <div class="controls">
            <button class="control-btn" id="newRoundBtn">New Round</button>
            <button class="mode-btn" id="easyBtn">Easy</button>
            <button class="mode-btn selected" id="hardBtn">Hard</button>
            <button class="control-btn" id="resetStreakBtn">Reset Streak</button>
        </div>
        <!-- Color Box Grid -->
        <div id="colorBoxContainer" class="color-box-container">
            <button class="color-box">1</button>
            <button class="color-box">2</button>
            <button class="color-box">3</button>
            <button class="color-box">4</button>
            <button class="color-box">5</button>
            <button class="color-box">6</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
