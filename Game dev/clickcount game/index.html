<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Click Counter Game</h1>
        <p class="subtitle">Click as fast as you can!</p>

        <div class="score-selection">
            <div class="score-box">
                <h2>Current Score</h2>
                <div id="currentScore" class="score">0</div>
            </div>
            <div class="score-box">
                <h2>High-Score</h2>
                <div id="highScore" class="score">0</div>
            </div>
        </div>

        <!-- Timer Display -->
        <div class="timer-section">
            <h1>Time Remaining</h1>
            <div class="timer" id="timer">10</div>
        </div>

        <div class="container">
            <ul>
                <li></li>
            </ul>
        </div>

        <!-- Game Buttons -->
        <div class="button-section">
            <button id="clickButton" class="click-btn" disabled>
                Click Me!
            </button>
            <button id="startButton" class="start-btn">
                Start Game
            </button>
            <button id="resetButton" class="reset-btn">
                Reset High Score
            </button>
        </div>

        <!-- Game Status Message -->
        <div id="statusMessage" class="status-message">
            <b>CLick "Start Game" to begin!</b>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
